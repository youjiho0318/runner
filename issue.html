<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이슈관리 — 러너로지스</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg:       #f0f4f9;
  --surface:  #ffffff;
  --surface2: #e8eef6;
  --border:   #d0dae8;
  --border2:  #b8c6dc;
  --text:     #1e293b;
  --text2:    #475569;
  --text3:    #94a3b8;
  --text4:    #cbd5e1;

  --accent:   #2563eb;
  --acc-soft: rgba(37,99,235,.09);
  --acc-bd:   rgba(37,99,235,.3);

  --orange:   #ea580c;
  --os:       rgba(234,88,12,.09);

  --today-bg: rgba(37,99,235,.08);
  --today-bd: rgba(37,99,235,.4);

  --shadow:   0 1px 4px rgba(0,0,0,.07);
  --shadow2:  0 4px 16px rgba(0,0,0,.1);
  --radius:   12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Sans KR", sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════
   헤더
══════════════════════ */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  position: sticky; top: 0; z-index: 100;
  padding: 0 20px;
}
.header-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center;
  height: 54px; gap: 12px;
}
.logo {
  display: flex; align-items: center; gap: 9px;
}
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, #f59e0b, #ea580c);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(245,158,11,.3);
}
.logo-text { font-size: 15px; font-weight: 900; letter-spacing: -.3px; color: var(--text); }
.logo-sub  { font-size: 10px; color: var(--text3); font-family: "JetBrains Mono", monospace; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.today-chip {
  background: var(--acc-soft); border: 1px solid var(--acc-bd);
  border-radius: 20px; padding: 4px 12px;
  font-size: 11px; color: var(--accent);
  font-family: "JetBrains Mono", monospace; white-space: nowrap; font-weight: 600;
}
.refresh-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 11px;
  color: var(--text2); font-size: 14px; cursor: pointer;
  transition: all .15s; font-weight: 700;
}
.refresh-btn:hover { background: var(--border); color: var(--text); }

/* ══════════════════════
   본문
══════════════════════ */
.main {
  max-width: 860px; margin: 0 auto;
  padding: 22px 16px 72px;
}

/* ══════════════════════
   컨트롤 바
══════════════════════ */
.ctrl-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px; flex-wrap: wrap;
  justify-content: space-between;
}
.ctrl-bar-left {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}

/* 기간 탭 */
.period-tabs {
  display: flex; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 3px; gap: 2px;
}
.ptab {
  padding: 6px 14px; border-radius: 7px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; border: none; background: none;
  color: var(--text2); font-family: "Noto Sans KR", sans-serif;
  transition: all .15s; white-space: nowrap;
}
.ptab:hover { color: var(--text); }
.ptab.active {
  background: var(--accent); color: #fff;
  box-shadow: 0 2px 6px rgba(37,99,235,.35);
}

/* 주 네비 */
.week-nav-wrap {
  display: flex; align-items: center; gap: 6px;
}
.wnav-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 11px;
  color: var(--text2); font-size: 13px; cursor: pointer;
  transition: all .15s; font-weight: 700;
}
.wnav-btn:hover { background: var(--surface2); color: var(--accent); border-color: var(--acc-bd); }
.week-range-txt {
  font-size: 11px; color: var(--text);
  font-family: "JetBrains Mono", monospace; font-weight: 600;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 14px; white-space: nowrap;
  min-width: 156px; text-align: center;
}

/* ══════════════════════
   KPI
══════════════════════ */
.kpi-bar {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 18px;
}
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  box-shadow: var(--shadow); transition: border-color .15s;
}
.kpi-card:hover { border-color: var(--border2); }
.kpi-label {
  font-size: 10px; color: var(--text2); font-weight: 700;
  letter-spacing: .5px; text-transform: uppercase; margin-bottom: 5px;
}
.kpi-val {
  font-size: 26px; font-weight: 900;
  font-family: "JetBrains Mono", monospace; line-height: 1;
  color: var(--text);
}
.kpi-card.k-all  .kpi-val { color: var(--text); }
.kpi-card.k-week .kpi-val { color: var(--accent); }
.kpi-card.k-today .kpi-val { color: var(--orange); }

/* ══════════════════════
   통합 이슈 카드
══════════════════════ */
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(37,99,235,.4); }
  50%      { box-shadow: 0 0 0 5px rgba(37,99,235,0); }
}
.sun-txt { color: #ef4444; } .sat-txt { color: #3b82f6; }

.issue-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: border-color .15s, box-shadow .15s, transform .15s;
  animation: fadeIn .18s ease both;
}
.issue-card:hover {
  border-color: var(--acc-bd);
  box-shadow: var(--shadow2);
  transform: translateY(-1px);
}

/* 날짜 헤더 영역 */
.ic-date-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.ic-date-bar.is-today {
  background: var(--today-bg);
  border-bottom-color: var(--today-bd);
}
.ic-date {
  font-size: 12px; font-weight: 700;
  font-family: "JetBrains Mono", monospace; color: var(--text);
}
.ic-dow { font-size: 11px; color: var(--text2); }
.ic-today-badge {
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 1px 8px; border-radius: 8px;
  animation: pulse 2s infinite;
}
.ic-cnt {
  margin-left: auto;
  font-size: 10px; color: var(--text3);
  font-family: "JetBrains Mono", monospace;
}

/* 비고 목록 영역 */
.ic-body { padding: 6px 0; }

.ic-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.ic-row:last-child { border-bottom: none; }
.ic-row:hover { background: var(--surface2); }

.ic-badge {
  flex-shrink: 0; margin-top: 2px;
  padding: 2px 9px; border-radius: 7px;
  font-size: 10px; font-weight: 700; white-space: nowrap;
  background: var(--acc-soft); color: var(--accent);
  border: 1px solid var(--acc-bd);
}
.ic-content {
  flex: 1; font-size: 13px; color: var(--text);
  line-height: 1.65; word-break: keep-all; white-space: pre-line;
}

/* ══════════════════════
   빈 / 에러 / 로딩
══════════════════════ */
.state-box {
  text-align: center; padding: 72px 20px;
}
.state-icon { font-size: 44px; display: block; margin-bottom: 14px; opacity: .4; }
.state-title { font-size: 15px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.state-sub { font-size: 12px; color: var(--text3); line-height: 1.9; }
.retry-btn {
  margin-top: 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; padding: 8px 22px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: "Noto Sans KR", sans-serif; transition: opacity .15s;
}
.retry-btn:hover { opacity: .85; }
.loading-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 72px 20px; gap: 14px;
}
.loader {
  width: 34px; height: 34px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 13px; color: var(--text2); }



/* ══════════════════════
   이슈 입력 버튼 (헤더)
══════════════════════ */
.write-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: "Noto Sans KR", sans-serif;
  transition: all .15s;
  box-shadow: 0 2px 8px rgba(37,99,235,.3);
  white-space: nowrap;
}
.write-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
.write-btn:active { transform: translateY(0); }

/* ══════════════════════
   이슈 입력 모달
══════════════════════ */
#write-modal {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.5);
  z-index: 8000;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: bgIn .2s ease;
}
.wm-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: 100%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,.18);
  overflow: hidden;
  animation: popUp .26s cubic-bezier(.34,1.56,.64,1);
}
.wm-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--acc-soft), var(--surface2));
  border-bottom: 1px solid var(--border);
}
.wm-title {
  font-size: 15px; font-weight: 900; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.wm-title-icon {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.wm-close {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 4px 11px;
  font-size: 15px; cursor: pointer; color: var(--text2); transition: all .15s;
}
.wm-close:hover { background: var(--border); color: var(--text); }

.wm-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.wm-row { display: flex; flex-direction: column; gap: 6px; }
.wm-label {
  font-size: 11px; font-weight: 700; color: var(--text2);
  letter-spacing: .3px; text-transform: uppercase;
}
.wm-input, .wm-select, .wm-textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px;
  font-size: 13px; color: var(--text);
  font-family: "Noto Sans KR", sans-serif;
  outline: none; transition: all .18s; width: 100%;
}
.wm-input:focus, .wm-select:focus, .wm-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  background: var(--surface);
}
.wm-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
.wm-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.wm-foot {
  padding: 12px 20px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}
.wm-cancel {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 18px;
  font-size: 13px; font-weight: 600; color: var(--text2);
  cursor: pointer; font-family: "Noto Sans KR", sans-serif; transition: background .15s;
}
.wm-cancel:hover { background: var(--border); }
.wm-save {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 8px 22px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: "Noto Sans KR", sans-serif; transition: opacity .15s;
  display: flex; align-items: center; gap: 6px;
}
.wm-save:hover { opacity: .88; }
.wm-save:disabled { opacity: .5; cursor: not-allowed; }
.wm-spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
.wm-save.saving .wm-spinner { display: block; }
.wm-save.saving .wm-save-txt { display: none; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff;
  padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
  z-index: 9000; animation: toastIn .25s ease; white-space: nowrap;
}
.toast.success { background: #16a34a; }
.toast.error   { background: var(--orange); }
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

/* ══════════════════════
   반응형
══════════════════════ */
@media (max-width: 560px) {
  .kpi-bar { grid-template-columns: repeat(3, 1fr); }
  .ctrl-bar { gap: 7px; }
  .logo-sub { display: none; }
  .week-range-txt { min-width: 120px; font-size: 10px; }
  .wm-row-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <div>
        <div class="logo-text">업무관리</div>
        <div class="logo-sub">RUNNER LOGIS</div>
      </div>
    </div>
    <div class="header-right">
      <div class="today-chip" id="hd-today">—</div>
      <button class="refresh-btn" onclick="reload()" title="새로고침">↺</button>
    </div>
  </div>
</header>

<!-- 본문 -->
<main class="main">

  <!-- 컨트롤 바 -->
  <div class="ctrl-bar">
    <div class="period-tabs">
      <button class="ptab active" data-mode="month" onclick="setMode(this,'month')">이번달</button>
      <button class="ptab"        data-mode="week"  onclick="setMode(this,'week')">주 검색</button>
    </div>
    <div class="week-nav-wrap" id="week-nav" style="display:none">
      <button class="wnav-btn" onclick="moveWeek(-1)">◀</button>
      <div class="week-range-txt" id="week-range-txt">—</div>
      <button class="wnav-btn" onclick="moveWeek(1)">▶</button>
    </div>
    <button class="write-btn" onclick="openWriteModal()">✏️ 업무 입력</button>
  </div>

  <!-- KPI -->
  <div class="kpi-bar">
    <div class="kpi-card k-all">
      <div class="kpi-label">기간 전체</div>
      <div class="kpi-val" id="kpi-all">—</div>
    </div>
    <div class="kpi-card k-week">
      <div class="kpi-label">이번주</div>
      <div class="kpi-val" id="kpi-week">—</div>
    </div>
    <div class="kpi-card k-today">
      <div class="kpi-label">오늘</div>
      <div class="kpi-val" id="kpi-today">—</div>
    </div>
  </div>

  <!-- 이슈 목록 -->
  <div id="issue-area">
    <div class="loading-wrap">
      <div class="loader"></div>
      <div class="loading-txt">이슈 데이터 불러오는 중…</div>
    </div>
  </div>

</main>

<!-- 이슈 입력 모달 -->
<div id="write-modal" style="display:none" onclick="if(event.target===this)closeWriteModal()">
  <div class="wm-box">
    <div class="wm-head">
      <div class="wm-title">
        <div class="wm-title-icon">✏️</div>
        이슈 입력
      </div>
      <button class="wm-close" onclick="closeWriteModal()">✕</button>
    </div>
    <div class="wm-body">
      <div class="wm-row-2">
        <div class="wm-row">
          <label class="wm-label">날짜 *</label>
          <input type="date" class="wm-input" id="wm-date">
        </div>
        <div class="wm-row">
          <label class="wm-label">구분 *</label>
          <select class="wm-select" id="wm-type">
            <option value="비고1">비고1</option>
            <option value="비고2">비고2</option>
            <option value="비고3">비고3</option>
          </select>
        </div>
      </div>
      <div class="wm-row">
        <label class="wm-label">내용 *</label>
        <textarea class="wm-textarea" id="wm-content" placeholder="이슈 내용을 입력하세요..."></textarea>
      </div>
      <div style="font-size:11px;color:var(--text3);line-height:1.6;padding:8px 10px;background:var(--surface2);border-radius:7px;border:1px solid var(--border);">
        ⚠️ 백업 시트의 해당 날짜 × 비고 셀에 직접 저장됩니다.<br>
        날짜 컬럼이 시트에 존재해야 저장됩니다.
      </div>
    </div>
    <div class="wm-foot">
      <button class="wm-cancel" onclick="closeWriteModal()">취소</button>
      <button class="wm-save" id="wm-save-btn" onclick="submitIssue()">
        <div class="wm-spinner"></div>
        <span class="wm-save-txt">저장</span>
      </button>
    </div>
  </div>
</div>



<script>
/* ════════════════════════
   설정
════════════════════════ */
var API_BASE    = "https://script.google.com/macros/s/AKfycbz6PQIGfl2l_P7KSBKQkuPLLPoHt-tLx-ZwcPlYUxNQj39oROys5MW4tObDrNhSQhew/exec";
var _jsonpTimer = null;

/* ════════════════════════
   상태
════════════════════════ */
var ALL_ISSUES = [];
var TODAY      = "";
var MODE       = "month";
var WEEK_OFFSET = 0;
var KD = ["일","월","화","수","목","금","토"];

/* ════════════════════════
   초기화
════════════════════════ */
window.addEventListener("DOMContentLoaded", function() {
  var now = new Date(); now.setDate(now.getDate() + 1);
  TODAY = toDS(now);
  document.getElementById("hd-today").textContent = fmtKor(TODAY);
  fetchIssues();
  renderWeekRange();
});

/* ════════════════════════
   유틸
════════════════════════ */
function toDS(d) {
  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,"0") + "-" +
    String(d.getDate()).padStart(2,"0");
}
function addD(s, n) {
  var d = new Date(s+"T00:00:00"); d.setDate(d.getDate()+n); return toDS(d);
}
function fmtFull(s) {
  var d = new Date(s+"T00:00:00");
  return d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0");
}
function fmtKor(s) {
  var d = new Date(s+"T00:00:00");
  return (d.getMonth()+1)+"월 "+d.getDate()+"일 ("+KD[d.getDay()]+")";
}
function fmtShort(s) {
  var d = new Date(s+"T00:00:00");
  return (d.getMonth()+1)+"/"+d.getDate();
}
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function getWeekRange(offset) {
  var td = new Date(TODAY+"T00:00:00");
  var sun = new Date(td);
  sun.setDate(td.getDate() - td.getDay() + offset * 7);
  var sat = new Date(sun); sat.setDate(sun.getDate()+6);
  return { start: toDS(sun), end: toDS(sat) };
}

/* ════════════════════════
   API 호출 — JSONP 전용
   Apps Script는 CORS를 지원하지 않으므로
   script 태그 방식(JSONP)으로만 호출
════════════════════════ */
function fetchIssues() {
  setArea('<div class="loading-wrap"><div class="loader"></div><div class="loading-txt">이슈 데이터 불러오는 중…</div></div>');

  // 이전 타이머 정리
  if (_jsonpTimer) { clearTimeout(_jsonpTimer); _jsonpTimer = null; }

  // 기존 JSONP 스크립트 태그 제거
  var old = document.getElementById("_jsonp_script");
  if (old && old.parentNode) old.parentNode.removeChild(old);

  var cbName = "_issuesCb";

  // 전역 콜백 등록
  window[cbName] = function(data) {
    if (_jsonpTimer) { clearTimeout(_jsonpTimer); _jsonpTimer = null; }
    var s = document.getElementById("_jsonp_script");
    if (s && s.parentNode) s.parentNode.removeChild(s);
    delete window[cbName];

    if (data && data.ok && Array.isArray(data.issues)) {
      ALL_ISSUES = data.issues;
      renderAll();
    } else {
      showError((data && data.error) || "데이터를 불러올 수 없습니다.");
    }
  };

  // script 태그 생성
  var script = document.createElement("script");
  script.id  = "_jsonp_script";
  script.src = API_BASE + "?callback=" + cbName;
  script.onerror = function() {
    if (_jsonpTimer) { clearTimeout(_jsonpTimer); _jsonpTimer = null; }
    if (script.parentNode) script.parentNode.removeChild(script);
    delete window[cbName];
    showError("네트워크 오류가 발생했습니다.<br>인터넷 연결을 확인하거나 잠시 후 다시 시도해주세요.");
  };

  // 30초 타임아웃
  _jsonpTimer = setTimeout(function() {
    var s = document.getElementById("_jsonp_script");
    if (s && s.parentNode) s.parentNode.removeChild(s);
    delete window[cbName];
    showError("요청 시간이 초과됐습니다. 다시 시도해주세요.");
  }, 30000);

  document.head.appendChild(script);
}

function reload() { WEEK_OFFSET = 0; fetchIssues(); }

/* ════════════════════════
   컨트롤
════════════════════════ */
function setMode(btn, mode) {
  MODE = mode;
  document.querySelectorAll(".ptab").forEach(function(b) { b.classList.toggle("active", b===btn); });
  document.getElementById("week-nav").style.display = mode==="week" ? "flex" : "none";
  if (mode==="week") { WEEK_OFFSET=0; renderWeekRange(); }
  renderAll();
}

function moveWeek(dir) {
  WEEK_OFFSET += dir;
  renderWeekRange();
  renderAll();
}

function renderWeekRange() {
  var r = getWeekRange(WEEK_OFFSET);
  document.getElementById("week-range-txt").textContent = fmtShort(r.start) + " ~ " + fmtShort(r.end);
}

/* ════════════════════════
   필터링
════════════════════════ */
function getFiltered() {
  var issues = ALL_ISSUES.slice(); // 전체 (타입 필터 없음)

  if (MODE === "month") {
    var ym = TODAY.slice(0,7);
    issues = issues.filter(function(i) { return i.date.slice(0,7) === ym; });
  } else {
    var r = getWeekRange(WEEK_OFFSET);
    issues = issues.filter(function(i) { return i.date >= r.start && i.date <= r.end; });
  }

  return issues;
}

/* ════════════════════════
   렌더링
════════════════════════ */
function renderAll() {
  var filtered = getFiltered();

  // KPI 업데이트
  var thisWeekR = getWeekRange(0);
  document.getElementById("kpi-all").textContent   = filtered.length;
  document.getElementById("kpi-week").textContent  = ALL_ISSUES.filter(function(i){ return i.date>=thisWeekR.start&&i.date<=thisWeekR.end; }).length;
  document.getElementById("kpi-today").textContent = ALL_ISSUES.filter(function(i){ return i.date===TODAY; }).length;

  if (!filtered.length) {
    var msg = MODE==="month" ? "이번달 등록된 이슈가 없습니다." : "해당 주의 이슈가 없습니다.";
    setArea('<div class="state-box"><span class="state-icon">📭</span>'+
      '<div class="state-title">'+msg+'</div>'+
      '<div class="state-sub">백업 시트 비고1/2/3 행에<br>내용을 입력하면 표시됩니다.</div></div>');
    return;
  }

  // 날짜별 그룹 (내림차순)
  var groups = {};
  filtered.forEach(function(i) {
    if (!groups[i.date]) groups[i.date] = [];
    groups[i.date].push(i);
  });
  var dates = Object.keys(groups).sort(function(a,b) { return b.localeCompare(a); });

  var html = "";
  dates.forEach(function(date, idx) {
    var isToday = (date === TODAY);
    var d       = new Date(date+"T00:00:00");
    var dow     = d.getDay();
    var dowStr  = KD[dow];
    var dowCls  = dow===0 ? "sun-txt" : dow===6 ? "sat-txt" : "";
    var items   = groups[date];
    var delay   = (idx * 0.05).toFixed(2);

    // 날짜 + 비고들을 하나의 카드에 통합
    html += "<div class='issue-card' style='animation-delay:"+delay+"s'>";

    // 날짜 헤더 바
    html += "<div class='ic-date-bar"+(isToday?" is-today":"")+"'>" +
      "<span class='ic-date'>"+date+"</span>" +
      "<span class='ic-dow "+dowCls+"'>"+dowStr+"요일</span>" +
      (isToday ? "<span class='ic-today-badge'>오늘</span>" : "") +
      "<span class='ic-cnt'>"+items.length+"건</span>" +
    "</div>";

    // 비고 목록
    html += "<div class='ic-body'>";
    items.forEach(function(iss) {
      html += "<div class='ic-row'>" +
        "<span class='ic-badge'>"+esc(iss.type)+"</span>" +
        "<div class='ic-content'>"+esc(iss.content)+"</div>" +
      "</div>";
    });
    html += "</div>";

    html += "</div>";
  });

  setArea(html);
}

function setArea(html) { document.getElementById("issue-area").innerHTML = html; }

function showError(msg) {
  setArea('<div class="state-box"><span class="state-icon">⚠️</span>'+
    '<div class="state-title">데이터를 불러오지 못했습니다</div>'+
    '<div class="state-sub">'+msg+'<br><br>'+
    '<button class="retry-btn" onclick="reload()">다시 시도</button>'+
    '</div></div>');
}



/* ════════════════════════
   이슈 입력 모달
════════════════════════ */
var _saveTimer = null;

function openWriteModal() {
  // 오늘 날짜 기본값
  document.getElementById("wm-date").value = TODAY;
  document.getElementById("wm-type").value = "비고1";
  document.getElementById("wm-content").value = "";
  setSaveBtnState(false);
  document.getElementById("write-modal").style.display = "flex";
  setTimeout(function(){ document.getElementById("wm-content").focus(); }, 150);
}

function closeWriteModal() {
  document.getElementById("write-modal").style.display = "none";
}

function setSaveBtnState(saving) {
  var btn = document.getElementById("wm-save-btn");
  if (saving) {
    btn.classList.add("saving");
    btn.disabled = true;
  } else {
    btn.classList.remove("saving");
    btn.disabled = false;
  }
}

function showToast(msg, type) {
  // 기존 토스트 제거
  var old = document.getElementById("_toast");
  if (old) old.remove();

  var t = document.createElement("div");
  t.id = "_toast";
  t.className = "toast " + (type || "");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.remove(); }, 3000);
}

function submitIssue() {
  var date    = document.getElementById("wm-date").value.trim();
  var type    = document.getElementById("wm-type").value;
  var content = document.getElementById("wm-content").value.trim();

  if (!date)    { showToast("날짜를 선택해주세요.", "error"); return; }
  if (!content) { showToast("내용을 입력해주세요.", "error"); return; }

  setSaveBtnState(true);

  // 기존 저장 스크립트 제거
  var old = document.getElementById("_save_script");
  if (old && old.parentNode) old.parentNode.removeChild(old);
  if (_saveTimer) { clearTimeout(_saveTimer); _saveTimer = null; }

  var cbName = "_saveCb";
  window[cbName] = function(data) {
    if (_saveTimer) { clearTimeout(_saveTimer); _saveTimer = null; }
    var s = document.getElementById("_save_script");
    if (s && s.parentNode) s.parentNode.removeChild(s);
    delete window[cbName];
    setSaveBtnState(false);

    if (data && data.ok) {
      showToast("✅ " + date + " " + type + " 저장 완료!", "success");
      closeWriteModal();
      // 목록 새로고침
      setTimeout(function(){ fetchIssues(); }, 500);
    } else {
      showToast("❌ " + ((data && data.error) || "저장 실패"), "error");
    }
  };

  var url = API_BASE
    + "?action=saveIssue"
    + "&date=" + encodeURIComponent(date)
    + "&type=" + encodeURIComponent(type)
    + "&content=" + encodeURIComponent(content)
    + "&callback=" + cbName;

  var script = document.createElement("script");
  script.id  = "_save_script";
  script.src = url;
  script.onerror = function() {
    if (_saveTimer) { clearTimeout(_saveTimer); _saveTimer = null; }
    if (script.parentNode) script.parentNode.removeChild(script);
    delete window[cbName];
    setSaveBtnState(false);
    showToast("❌ 네트워크 오류. 다시 시도해주세요.", "error");
  };

  _saveTimer = setTimeout(function() {
    var s = document.getElementById("_save_script");
    if (s && s.parentNode) s.parentNode.removeChild(s);
    delete window[cbName];
    setSaveBtnState(false);
    showToast("❌ 요청 시간 초과. 다시 시도해주세요.", "error");
  }, 30000);

  document.head.appendChild(script);
}
</script>
